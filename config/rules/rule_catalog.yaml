# ==========================================================================
# 経費リスク評価ルールカタログ (rule_catalog.yaml)
# --------------------------------------------------------------------------
# 内部監査・不正調査の知見および過去不正事例に基づくルール群。
# クライアントの規程・データ項目に合わせて追加・見直し可能。
#
# schema (各ルール):
#   id:                 一意ID（CAT-NNN）
#   category:           カテゴリID（categories 参照）
#   name_ja:            ルール名
#   description_ja:     抽出条件の説明
#   severity:           low | medium | high | critical
#   base_weight:        0-100 のスコア寄与（複数該当時は risk_scoring に従い合成）
#   detection:
#     type:             deterministic | statistical | ml_assisted | agent_verified
#     condition_ja:     判定条件
#     required_fields:  必要な入力フィールド（data_contracts の ExpenseLine 等）
#   evidence:           収集・参照すべき証憑（agent_verified 時）
#   applies_to:         対象費目（all または 費目リスト）
#   false_positive_notes_ja: 誤検知の典型と除外条件（アラート疲れ対策・必須）
#   hitl:               auto_dismiss | review | escalate（既定のトリアージ）
#   references:         関連する統制・基準
# ==========================================================================

version: "1.0"

metadata:
  total_rules: 62
  category_count: 10
  source_ja: "内部監査・不正調査の知見および過去不正事例"
  customizable: true
  note_ja: "費目別の詳細な不正シナリオは fraud_scenarios.yaml を参照"

# --------------------------------------------------------------------------
# リスクスコアリング（誤検知管理・トリアージの基盤 / spec改善点5）
# --------------------------------------------------------------------------
risk_scoring:
  scale: "0-100"
  combination_ja: >-
    複数ルール該当時は base_weight を加重合成（単純合算ではなく、上限100で
    逓減加算）。ML 異常スコアと SHAP 寄与を統合し最終 risk_score を算出。
  ml_blend_ja: "ルールスコア と ML外れ値スコア(IF/LOF/AE/PCA) を重み付き統合"
  explainability_required: true   # 全スコアに 違反ルール / SHAP寄与 を添付（根拠なきスコア禁止）

thresholds:
  # 探索的分析ダッシュボードの "High閾値" に相当。クライアント別に調整可能。
  high: 70          # これ以上はエージェント深掘り対象（ファネルの選別ライン）
  medium: 40
  triage:
    auto_dismiss_below: 20   # 自動棄却（人手レビュー不要）
    review_range: [20, 70]   # 人手レビュー
    escalate_at_or_above: 70 # エージェント検証＋優先レビュー

# --------------------------------------------------------------------------
# カテゴリ定義（10カテゴリ）
# --------------------------------------------------------------------------
categories:
  - { id: CTRL,  name_ja: 統制・承認 }
  - { id: DUP,   name_ja: 重複 }
  - { id: TIME,  name_ja: 時間 }
  - { id: AMT,   name_ja: 金額 }
  - { id: VEND,  name_ja: 取引先 }
  - { id: PART,  name_ja: 参加者 }
  - { id: CONS,  name_ja: 整合性 }
  - { id: BEHV,  name_ja: 行動 }
  - { id: PATT,  name_ja: パターン }
  - { id: COMM,  name_ja: 通信・IT }

# --------------------------------------------------------------------------
# ルール群
# --------------------------------------------------------------------------
rules:

  # ===== 統制・承認 (CTRL) =====
  - id: CTRL-001
    category: CTRL
    name_ja: 自己承認
    description_ja: 申請者と承認者が同一（自己承認）
    severity: high
    base_weight: 35
    detection: { type: deterministic, condition_ja: "applicant_id == approver_id", required_fields: [applicant_id, approver_id] }
    applies_to: [all]
    false_positive_notes_ja: "正当な代理承認設定・小額自動承認の閾値内は除外。承認権限委譲ログを確認"
    hitl: escalate
    references: [J-SOX ITGC, 職務分掌]

  - id: CTRL-002
    category: CTRL
    name_ja: 上限ギリギリ申請の多発
    description_ja: 承認上限の直下に張り付く申請が同一申請者で多発
    severity: medium
    base_weight: 25
    detection: { type: statistical, condition_ja: "申請額が承認上限の95-100%に集中する頻度が同職位平均を有意に超過", required_fields: [applicant_id, amount, approval_limit] }
    applies_to: [all]
    false_positive_notes_ja: "業務特性上、定常的に高額となる職種（営業等）は職位別基準で評価"
    hitl: review
    references: [統制回避]

  - id: CTRL-003
    category: CTRL
    name_ja: 承認権限超過
    description_ja: 承認者の決裁権限額を超える申請の承認
    severity: high
    base_weight: 30
    detection: { type: deterministic, condition_ja: "amount > approver_authority_limit", required_fields: [amount, approver_id, approver_authority_limit] }
    applies_to: [all]
    false_positive_notes_ja: "上位者代理承認・特例決裁の正規記録があれば除外"
    hitl: escalate
    references: [職務権限規程]

  - id: CTRL-004
    category: CTRL
    name_ja: 事後承認の常態化
    description_ja: 取引発生後に遡って承認されるケースが常態化
    severity: medium
    base_weight: 20
    detection: { type: deterministic, condition_ja: "approval_timestamp < transaction_date", required_fields: [approval_timestamp, transaction_date] }
    applies_to: [all]
    false_positive_notes_ja: "緊急対応の事後承認規程に則ったものは頻度で評価"
    hitl: review
    references: [統制活動]

  - id: CTRL-005
    category: CTRL
    name_ja: 承認者・申請者の関係性
    description_ja: 承認者と申請者が近親・利害関係（同一世帯/取引関係）
    severity: medium
    base_weight: 22
    detection: { type: agent_verified, condition_ja: "公開情報・人事データから利害関係を推認", required_fields: [applicant_id, approver_id] }
    evidence: [人事マスタ, 公開情報]
    applies_to: [all]
    false_positive_notes_ja: "推認のみでは確定不可。HITLで人間が判断"
    hitl: review
    references: [独立性, 利益相反]

  - id: CTRL-006
    category: CTRL
    name_ja: 承認ワークフローの迂回
    description_ja: 規定の承認段階をスキップした申請
    severity: high
    base_weight: 28
    detection: { type: deterministic, condition_ja: "required_approval_steps とログの段階数が不一致", required_fields: [workflow_log, required_approval_steps] }
    applies_to: [all]
    false_positive_notes_ja: "ワークフロー設定変更時の移行期は構成変更履歴を確認"
    hitl: escalate
    references: [J-SOX ITGC]

  # ===== 重複 (DUP) =====
  - id: DUP-001
    category: DUP
    name_ja: 同一日・同一金額・同一取引先の重複
    description_ja: 同一日・同一金額・同一取引先の申請が重複
    severity: high
    base_weight: 30
    detection: { type: deterministic, condition_ja: "(date, amount, vendor_id) が複数明細で一致", required_fields: [transaction_date, amount, vendor_id] }
    applies_to: [all]
    false_positive_notes_ja: "同一店舗での正当な複数回利用（往復・複数人別精算）を除外条件で考慮"
    hitl: escalate
    references: [二重計上]

  - id: DUP-002
    category: DUP
    name_ja: 法人カードと現金精算の二重計上
    description_ja: 法人カード明細と現金精算で同一支出が二重計上
    severity: high
    base_weight: 32
    detection: { type: deterministic, condition_ja: "法人カード明細と経費精算明細で (date±1, amount, merchant) が突合", required_fields: [transaction_date, amount, vendor_id, payment_method] }
    applies_to: [all]
    false_positive_notes_ja: "分割決済・部分精算のケースは金額按分で確認"
    hitl: escalate
    references: [二重計上]

  - id: DUP-003
    category: DUP
    name_ja: 上限回避のための分割
    description_ja: 1取引を承認上限以下に分割して複数申請
    severity: high
    base_weight: 28
    detection: { type: statistical, condition_ja: "同一取引先・近接日に上限直下の申請が連続", required_fields: [vendor_id, transaction_date, amount, approval_limit] }
    applies_to: [all]
    false_positive_notes_ja: "定常的な小口反復取引（消耗品の都度購入等）は頻度・文脈で評価"
    hitl: review
    references: [統制回避]

  - id: DUP-004
    category: DUP
    name_ja: 却下申請の再提出
    description_ja: 一度却下された申請を内容微修正で再提出し承認取得
    severity: medium
    base_weight: 22
    detection: { type: deterministic, condition_ja: "却下履歴と類似する後続の承認済み申請", required_fields: [rejection_log, applicant_id, amount, vendor_id] }
    applies_to: [all]
    false_positive_notes_ja: "正当な不備修正・再申請を除外。却下理由の解消有無を確認"
    hitl: review
    references: [統制回避]

  - id: DUP-005
    category: DUP
    name_ja: 複数従業員による同一支出の重複請求
    description_ja: 同一会食・同一移動を参加者各人が別々に請求
    severity: high
    base_weight: 26
    detection: { type: agent_verified, condition_ja: "同一日時・同一店舗の複数申請者の交際費/会食を突合", required_fields: [transaction_date, vendor_id, participants, applicant_id] }
    evidence: [予定表, 会議出席者]
    applies_to: [交際費, 会議費, 接待]
    false_positive_notes_ja: "別会計（割り勘の各自負担）が正規の場合あり。参加者・金額の整合で判断"
    hitl: escalate
    references: [二重計上]

  # ===== 時間 (TIME) =====
  - id: TIME-001
    category: TIME
    name_ja: 休日・深夜・長期休暇中の経費
    description_ja: 休日・深夜・本人の長期休暇期間中に発生した経費
    severity: medium
    base_weight: 24
    detection: { type: deterministic, condition_ja: "transaction_datetime が休日/深夜/休暇カレンダーに該当", required_fields: [transaction_datetime, applicant_id] }
    evidence: [勤怠データ, 予定表]
    applies_to: [all]
    false_positive_notes_ja: "休日出勤・夜間業務が正規の職種/承認済シフトは除外"
    hitl: review
    references: [不正リスク対応基準]

  - id: TIME-002
    category: TIME
    name_ja: 出張期間外・在宅日の交通費/会食
    description_ja: 出張期間外、または在宅勤務日の交通費・会食申請
    severity: medium
    base_weight: 24
    detection: { type: agent_verified, condition_ja: "出張予定/勤怠（在宅）と経費発生日の不整合", required_fields: [transaction_date, applicant_id, expense_category] }
    evidence: [出張予定, 勤怠データ, 移動記録]
    applies_to: [旅費交通費, 交際費, 会議費]
    false_positive_notes_ja: "在宅日の正規の業務移動・近隣訪問は経路で確認"
    hitl: review
    references: [カラ出張]

  - id: TIME-003
    category: TIME
    name_ja: 取引時刻と入力時刻の大幅乖離
    description_ja: 取引発生から申請入力までが異常に長い/遡及入力
    severity: low
    base_weight: 12
    detection: { type: deterministic, condition_ja: "abs(entry_timestamp - transaction_date) が基準超", required_fields: [entry_timestamp, transaction_date] }
    applies_to: [all]
    false_positive_notes_ja: "月締めまとめ入力の運用は基準値を運用実態に合わせる"
    hitl: review
    references: [整合性]

  - id: TIME-004
    category: TIME
    name_ja: 同時刻の連続申請
    description_ja: 物理的に不可能な短時間に多数の取引が連続
    severity: medium
    base_weight: 20
    detection: { type: deterministic, condition_ja: "同一申請者で近接時刻に複数取引、移動可能性と矛盾", required_fields: [transaction_datetime, applicant_id, location] }
    applies_to: [all]
    false_positive_notes_ja: "同一施設内の連続購買等は地点整合で除外"
    hitl: review
    references: [行動分析]

  - id: TIME-005
    category: TIME
    name_ja: 期末日付への集中入力
    description_ja: 期末・月末日付に入力が不自然に集中
    severity: low
    base_weight: 14
    detection: { type: statistical, condition_ja: "期末数日の入力件数が平常比で有意に増加", required_fields: [entry_timestamp] }
    applies_to: [all]
    false_positive_notes_ja: "締め日処理の正常な集中と区別（金額・費目の異常と複合評価）"
    hitl: review
    references: [パターン分析]

  # ===== 金額 (AMT) =====
  - id: AMT-001
    category: AMT
    name_ja: キリのいい金額の多発
    description_ja: 端数のないキリのいい金額の申請が多発
    severity: low
    base_weight: 14
    detection: { type: statistical, condition_ja: "末尾000等のラウンド数の比率が異常", required_fields: [amount] }
    applies_to: [all]
    false_positive_notes_ja: "定額手当・定額サービスはマスタで除外"
    hitl: review
    references: [概算・水増し]

  - id: AMT-002
    category: AMT
    name_ja: 上限金額への一致
    description_ja: 申請額が承認上限・費目上限にちょうど一致
    severity: medium
    base_weight: 20
    detection: { type: deterministic, condition_ja: "amount == category_limit または approval_limit", required_fields: [amount, category_limit, approval_limit] }
    applies_to: [all]
    false_positive_notes_ja: "定額の上限消化（日当等）は費目特性で除外"
    hitl: review
    references: [統制回避]

  - id: AMT-003
    category: AMT
    name_ja: ベンフォードの法則からの乖離
    description_ja: 先頭桁分布がベンフォード分布から有意に乖離
    severity: medium
    base_weight: 18
    detection: { type: statistical, condition_ja: "申請者/費目単位の先頭桁分布がベンフォード期待値とカイ二乗検定で乖離", required_fields: [amount] }
    applies_to: [all]
    false_positive_notes_ja: "母数が小さい集団は検定の信頼度が低い。サンプル数を確認"
    hitl: review
    references: [不正検査, ACFE]

  - id: AMT-004
    category: AMT
    name_ja: ベンチマーク比の金額突出
    description_ja: 同種取引・同店舗の相場に対し金額が突出して大/小
    severity: medium
    base_weight: 22
    detection: { type: ml_assisted, condition_ja: "費目×取引先の金額分布で外れ値（IF/LOF）", required_fields: [amount, vendor_id, expense_category] }
    applies_to: [all]
    false_positive_notes_ja: "正当な高額（大人数会食等）は参加者数で正規化"
    hitl: review
    references: [外れ値検知]

  - id: AMT-005
    category: AMT
    name_ja: 端数の不自然な一致
    description_ja: 複数申請で同一の特異な端数が反復（捏造の痕跡）
    severity: low
    base_weight: 12
    detection: { type: statistical, condition_ja: "特定端数の反復頻度が異常", required_fields: [amount] }
    applies_to: [all]
    false_positive_notes_ja: "税込端数・固定料金は除外"
    hitl: review
    references: [捏造]

  # ===== 取引先 (VEND) =====
  - id: VEND-001
    category: VEND
    name_ja: 反社・制裁・休眠先との取引
    description_ja: 反社・制裁リスト・休眠/実体不明先との取引
    severity: critical
    base_weight: 50
    detection: { type: agent_verified, condition_ja: "取引先を反社/制裁/公開情報リストと照合", required_fields: [vendor_id, vendor_name] }
    evidence: [反社リスト, 制裁リスト, 公開情報]
    applies_to: [all]
    false_positive_notes_ja: "同名異社の誤判定に注意。所在地・登記情報で本人特定を確認"
    hitl: escalate
    references: [反社対応, AML, 公開情報]

  - id: VEND-002
    category: VEND
    name_ja: 特定店舗・取引先への集中
    description_ja: 特定の店舗・取引先への支出が異常に集中
    severity: medium
    base_weight: 22
    detection: { type: statistical, condition_ja: "申請者の取引先集中度（HHI等）が異常", required_fields: [vendor_id, applicant_id, amount] }
    applies_to: [all]
    false_positive_notes_ja: "近隣・常用店の正当な反復は文脈で評価"
    hitl: review
    references: [キックバック, 癒着]

  - id: VEND-003
    category: VEND
    name_ja: 新規取引先の初回高額
    description_ja: 新規登録直後の取引先へ初回から高額支出
    severity: medium
    base_weight: 20
    detection: { type: deterministic, condition_ja: "vendor 初出 かつ amount が費目上位分位", required_fields: [vendor_id, amount, vendor_first_seen] }
    evidence: [取引先マスタ, 公開情報]
    applies_to: [all]
    false_positive_notes_ja: "正規の新規取引開始（与信済）は登録経緯を確認"
    hitl: review
    references: [架空取引先]

  - id: VEND-004
    category: VEND
    name_ja: 取引先所在地・業態の不整合
    description_ja: 取引先の所在地・業態が申請内容と矛盾
    severity: medium
    base_weight: 22
    detection: { type: agent_verified, condition_ja: "地図/公開情報で店舗の所在地・業態を確認し申請費目と照合", required_fields: [vendor_name, vendor_address, expense_category] }
    evidence: [地図API, 公開情報, 領収書OCR]
    applies_to: [交際費, 会議費, 消耗品, 接待]
    false_positive_notes_ja: "複合業態・移転直後の情報遅延に注意"
    hitl: review
    references: [実在性]

  - id: VEND-005
    category: VEND
    name_ja: 関連当事者取引
    description_ja: 従業員・役員の関連当事者が取引先
    severity: high
    base_weight: 28
    detection: { type: agent_verified, condition_ja: "取引先と従業員/役員の関連性を公開情報・人事データから推認", required_fields: [vendor_id, applicant_id] }
    evidence: [公開情報, 人事マスタ]
    applies_to: [all]
    false_positive_notes_ja: "推認のみ。利益相反の開示有無をHITLで確認"
    hitl: escalate
    references: [利益相反, 関連当事者]

  # ===== 参加者 (PART) =====
  - id: PART-001
    category: PART
    name_ja: 参加者欄が空欄/「他○名」のみ
    description_ja: 交際費の参加者欄が空欄、または「他○名」のみ
    severity: medium
    base_weight: 22
    detection: { type: deterministic, condition_ja: "participants が空 または 不特定表現のみ", required_fields: [participants, expense_category] }
    applies_to: [交際費, 接待, 会議費]
    false_positive_notes_ja: "大規模イベント等で名簿別添の運用は添付有無を確認"
    hitl: review
    references: [交際費の実在性]

  - id: PART-002
    category: PART
    name_ja: 社内のみの交際費計上
    description_ja: 社外参加者がなく社内のみなのに交際費（接待）計上
    severity: medium
    base_weight: 20
    detection: { type: deterministic, condition_ja: "participants が全員社内 かつ category==交際費", required_fields: [participants, expense_category, employee_master] }
    applies_to: [交際費, 接待]
    false_positive_notes_ja: "費目誤りの可能性（会議費等への振替）。税務上の交際費区分と整合確認"
    hitl: review
    references: [費目付替え, 税務]

  - id: PART-003
    category: PART
    name_ja: 参加人数と金額の不整合
    description_ja: 申告参加人数に対し金額が過大/過小
    severity: medium
    base_weight: 18
    detection: { type: statistical, condition_ja: "amount / headcount が費目相場の外れ値", required_fields: [amount, participants, expense_category] }
    applies_to: [交際費, 会議費, 接待]
    false_positive_notes_ja: "高級店・少人数高単価の正規ケースは店舗業態で確認"
    hitl: review
    references: [水増し]

  - id: PART-004
    category: PART
    name_ja: 同一参加者の反復
